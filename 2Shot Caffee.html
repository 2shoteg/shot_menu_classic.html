  :root {
    --bg: #0E0E0E;
    --accent: #2ECC71;
    --dark-green: #1A4D35;
    --mid-green: #2A7A4A;
    --white: #FFFFFF;
    --muted: #888888;
    --card-bg: #141414;
    --card-border: rgba(46,204,113,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--bg);
    font-family: 'Tajawal', sans-serif;
    color: var(--white);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(46,204,113,0.08) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 80%, rgba(26,77,53,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(46,204,113,0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 48px 24px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Logo */
  .logo-wrap {
    margin-bottom: 6px;
    animation: fadeDown 0.7s ease both;
  }
  .logo-wrap img {
    width: 110px;
    height: 110px;
    object-fit: contain;
    filter: brightness(0) invert(1) drop-shadow(0 0 10px rgba(255,255,255,0.5)) drop-shadow(0 0 22px rgba(255,255,255,0.3));
  }

  /* Brand name */
  .brand-name {
    font-size: 32px;
    font-weight: 900;
    color: var(--white);
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(255,255,255,0.3), 0 0 40px rgba(46,204,113,0.2);
    animation: fadeDown 0.7s 0.1s ease both;
    margin-bottom: 4px;
  }

  .brand-sub {
    font-size: 12px;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 6px;
    text-transform: uppercase;
    opacity: 0.85;
    animation: fadeDown 0.7s 0.15s ease both;
    margin-bottom: 32px;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    margin-bottom: 28px;
    animation: fadeDown 0.7s 0.2s ease both;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(46,204,113,0.5), transparent);
  }
  .divider-diamond {
    width: 6px;
    height: 6px;
    background: var(--accent);
    transform: rotate(45deg);
    box-shadow: 0 0 8px rgba(46,204,113,0.7);
  }

  /* Links */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: linear-gradient(135deg, #111111, #1a2e1f);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    text-decoration: none;
    color: var(--white);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
  }

  .link-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--dark-green), var(--accent));
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .link-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 24px rgba(46,204,113,0.35);
    transform: translateY(-2px);
  }
  .link-card:hover::before { opacity: 1; }
  .link-card:hover .link-title,
  .link-card:hover .link-desc,
  .link-card:hover .link-icon { color: #000; }

  .link-card:nth-child(1) { animation-delay: 0.25s; }
  .link-card:nth-child(2) { animation-delay: 0.35s; }
  .link-card:nth-child(3) { animation-delay: 0.45s; }
  .link-card:nth-child(4) { animation-delay: 0.55s; }
  .link-card:nth-child(5) { animation-delay: 0.65s; }

  .link-left {
    display: flex;
    flex-direction: column;
    gap: 3px;
    position: relative;
    z-index: 1;
  }

  .link-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 1px;
    transition: color 0.3s ease;
  }

  .link-desc {
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
    transition: color 0.3s ease;
  }

  .link-icon {
    font-size: 20px;
    color: var(--accent);
    position: relative;
    z-index: 1;
    transition: color 0.3s ease;
    width: 28px;
    text-align: center;
  }

  /* SVG icons */
  .link-icon svg {
    width: 22px;
    height: 22px;
    fill: currentColor;
  }

  /* Footer */
  .footer {
    margin-top: 36px;
    text-align: center;
    animation: fadeUp 0.5s 0.75s ease both;
    opacity: 0;
  }
  .footer-text {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 2px;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
